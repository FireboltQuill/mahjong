<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🀄 Mahjong</title>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }
  html, body {
    user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
  }
  *:focus, *:active, *:focus-visible {
    outline: none !important; outline-width: 0 !important;
  }
  button:focus, button:active, button:focus-visible {
    box-shadow: none !important;
  }
  ::selection { background: transparent; }
  ::-moz-selection { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>

<!--
  Each js/*.jsx file is a separate <script type="text/babel"> processed by
  babel-standalone in document order. They share the global scope, so later
  scripts can call functions/constants defined in earlier scripts. The load
  order matches the dependency direction (tiles → everything else).

  Note: external babel-standalone scripts are fetched, so opening this file
  via file:// can be blocked by the browser. For local dev, serve the
  directory (e.g. python3 -m http.server) and open via http://.
-->
<script type="text/babel" src="js/tiles.jsx"></script>
<script type="text/babel" src="js/lang.jsx"></script>
<script type="text/babel" src="js/parsers.jsx"></script>
<script type="text/babel" src="js/validation.jsx"></script>
<script type="text/babel" src="js/claims.jsx"></script>
<script type="text/babel" src="js/ai.jsx"></script>
<script type="text/babel" src="js/scoring.jsx"></script>
<script type="text/babel" src="js/game-state.jsx"></script>
<script type="text/babel" src="js/styles.jsx"></script>
<script type="text/babel" src="js/main.jsx"></script>
</body>
</html>
